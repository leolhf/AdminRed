name: Recordatorios diarios de cobro

on:
  schedule:
    # 13:00 UTC ≈ 8-9 AM en Cuba (America/Havana), según horario de verano.
    # Cambia la hora aquí si quieres que llegue en otro momento del día.
    - cron: '0 13 * * *'
  workflow_dispatch: {} # permite ejecutarlo manualmente desde la pestaña "Actions" para probar

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: scripts
        run: npm install

      - name: Enviar recordatorios
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node enviar-recordatorios.js
